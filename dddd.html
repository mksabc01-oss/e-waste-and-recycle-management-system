<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Waste Collection System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7f0;
            margin: 0;
            padding: 0;
            color: #333;
        }
        
        .container {
            width: 80%;
            max-width: 1000px;
            margin: 30px auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            display: flex;
            overflow: hidden;
        }
        
        .form-section {
            flex: 1;
            padding: 30px;
        }
        
        .image-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e8f5e9;
            padding: 20px;
        }
        
        h1 {
            color: #2e7d32;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2e7d32;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus {
            border-color: #2e7d32;
            outline: none;
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.3);
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        
        .submit-btn {
            background-color: #2e7d32;
            color: white;
        }
        
        .submit-btn:hover {
            background-color: #1b5e20;
        }
        
        .clear-btn {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #2e7d32;
        }
        
        .clear-btn:hover {
            background-color: #c8e6c9;
        }
        
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo h2 {
            color: #2e7d32;
            margin: 5px 0;
        }
        
        .logo p {
            color: #5a5a5a;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="/api/placeholder/400/320" alt="E-waste Recycling Image">
        </div>
        
        <div class="form-section">
            <div class="logo">
                <h2>E-Waste Collection</h2>
                
            </div>
            
            <form id="collectionForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" name="productName" placeholder="Enter electronic product name" required>
                </div>
                
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" min="1" placeholder="Enter quantity" required>
                </div>
                
                <div class="form-group">
                    <label for="price">Price (Estimated value)</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" placeholder="Enter estimated price" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                
                <div class="buttons">
                    <button type="submit" class="submit-btn">Submit</button>
                    <button type="reset" class="clear-btn">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('collectionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const productName = document.getElementById('productName').value;
            const quantity = document.getElementById('quantity').value;
            const price = document.getElementById('price').value;
            const email = document.getElementById('email').value;
            
            // Here you would typically send the data to a server
            // For now, we'll just show an alert
            alert(`Thank you for your submission!\n\nProduct: ${productName}\nQuantity: ${quantity}\nPrice: $${price}\nEmail: ${email}\n\nWe will contact you shortly to arrange collection.`);
            
            // Optionally reset the form
            this.reset();
        });
    </script>
</body>
</html>
