<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>E waste collection payment</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
        <div class="container">
            <form action="">
                <div class="row">
                    <div class="column">
                        <h3 class="title">Billing Address</h3>
                        <div class="input-box">
                            <span>Full Name :</span>
                            <input type="text" placeholder="Sampath Kumara">
                        </div>
                        <div class="input-box">
                            <span>Email :</span>
                            <input type="email" placeholder="example@xyz.com">
                        </div>
                        <div class="input-box">
                            <span>Address :</span>
                            <input type="text" placeholder="No 07, main street,colombo">
                        </div>
                        <div class="input-box">
                            <span>City :</span>
                            <input type="text" placeholder="Colombo">
                        </div>

                        <div class="flex">
                            <div class="input-box">
                                <span>State :</span>
                                <input type="text" placeholder="Sri Lanka">
                            </div>
                            <div class="input-box">
                                <span>Zip Code :</span>
                                <input type="number" placeholder="123 456">
                            </div>
                        </div>
                    </div>

                    <div class="column">
                        <h3 class="title">Payment</h3>
                        <div class="input-box">
                            <span>Cards Accepted :</span>
                            <img src="#" alt="cards accepted">
                        </div>
                        <div class="input-box">
                            <span>Name On Card :</span>
                            <input type="text" placeholder="Mr. Sampath Kumara">
                        </div>
                        <div class="input-box">
                            <span>Credit Card Number :</span>
                            <input type="number" placeholder="1111 2222 3333 4444">
                        </div>
                        <div class="input-box">
                            <span>Exp. Month :</span>
                            <input type="text" placeholder="Augest">
                        </div>

                        <div class="flex">
                            <div class="input-box">
                                <span>Exp.Year :</span>
                                <input type="number" placeholder="2026">
                            </div>
                            <div class="input-box">
                                <span>CVV :</span>
                                <input type="number" placeholder="123">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn">Submit</button> 
            </form>
        </div>
    </body>
</html>
